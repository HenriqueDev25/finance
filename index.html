<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartão Virtual - Pablo Henrique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Cores de Fundo (Sólidas) */
            --bg-body: #050505;
            --bg-card: #111214;
            
            /* Paleta Principal em Hexadecimal */
            --theme-light: #ffd118;
            --theme-main: #d2b618;
            --theme-dark: #bb9108;
            --theme-gradient: linear-gradient(135deg, var(--theme-light), var(--theme-main), var(--theme-dark));

            /* =========================================
               🎨 CONTROLE DE SOMBRAS E TRANSPARÊNCIAS (#)
               Os dois últimos dígitos definem a opacidade.
               Ex: 66 = 40%, 40 = 25%, 26 = 15%, 80 = 50%
               ========================================= */
            /* Sombras Coloridas (Tema) */
            --shadow-theme-strong: #c5a52266; /* Hover dos ícones sociais */
            --shadow-theme-medium: #c5ad2240; /* Sombra normal do botão Salvar */
            --shadow-theme-light:  #c59c2226; /* Sombra ao clicar no botão Salvar */

            /* Sombras Escuras (Preto/Fundo) */
            --shadow-card: #000000e6; /* Sombra em volta do cartão principal */
            --shadow-img:  #00000080; /* Sombra da foto de perfil */
            --shadow-text: #000000cc; /* Sombra do texto no rodapé */

            /* Fundos com Transparência */
            --bg-icon:    #111214bf; /* Fundo escuro dos ícones */
            --bg-loading: #ffffff1a; /* Fundo apagado da barra de carregamento */
            /* ========================================= */
        }

        /* =========================================
           🛠️ SISTEMA DE EDIÇÃO DE ÍCONES (FÁCIL AJUSTE)
           =========================================
           Altere o valor numérico de "--posicao".
           Positivo (ex: 1, 1.5) = Move para CIMA 
           Negativo (ex: -1, -1.5) = Move para BAIXO
           Zero (0) = Centro exato
        ========================================= */
        .icons-container {
            --forca: 15px; /* Intensidade do movimento. Se quiser movimentos maiores, aumente este valor */
        }

        .icons-container .icon-btn:nth-child(1) { --posicao: -1;   } /* 1º Ícone (E-mail) */
        .icons-container .icon-btn:nth-child(2) { --posicao: -1; } /* 2º Ícone (GitHub) */
        .icons-container .icon-btn:nth-child(3) { --posicao: -1;    } /* 3º Ícone (Instagram) - Centro */
        .icons-container .icon-btn:nth-child(4) { --posicao: -1; } /* 4º Ícone (WhatsApp) */
        .icons-container .icon-btn:nth-child(5) { --posicao: -1;   } /* 5º Ícone (Telefone) */
        /* ========================================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            overflow: hidden; 
            overscroll-behavior: none;
        }

        /* TELA DE INTRODUÇÃO */
        .splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: var(--bg-body); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s; }
        .splash-icon { font-size: 60px; background: var(--theme-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; animation: pulse 1.5s infinite ease-in-out; will-change: transform; }
        .splash-title { color: var(--theme-main); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 30px; }
        .loading-container { width: 180px; height: 3px; background: var(--bg-loading); border-radius: 4px; overflow: hidden; }
        .loading-bar { height: 100%; width: 0%; background: var(--theme-gradient); animation: loadProgress 1.8s ease-out forwards; }
        .splash-hidden { opacity: 0; visibility: hidden; }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
        @keyframes loadProgress { 0% { width: 0%; } 60% { width: 80%; } 100% { width: 100%; } }

        .card-enter { animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 1.8s; opacity: 0; transform: translateY(20px); will-change: transform, opacity; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        /* CARTÃO PRINCIPAL */
        .card { background-color: var(--bg-card); width: 100%; max-width: 414px; min-height: 100dvh; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 40px var(--shadow-card); }

        /* IMAGEM DE FUNDO - APAGADA */
        .bottom-image-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 45vh; background-image: url(''); background-size: cover; background-position: center; z-index: 0; opacity: 0.15; }
        .bottom-image-bg::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, var(--bg-card) 0%, transparent 60%, var(--bg-card) 100%); }

        /* CURVAS TEMÁTICAS */
        .card::before, .card::after { content: ''; position: absolute; border-radius: 50%; pointer-events: none; border: 1px solid var(--theme-dark); opacity: 0.3; z-index: 1; }
        .card::before { width: 150vw; height: 150vw; max-width: 600px; max-height: 600px; top: -30%; left: -25%; }
        .card::after { width: 200vw; height: 200vw; max-width: 800px; max-height: 800px; bottom: -65%; left: -50%; }

        /* CABEÇALHO E PERFIL */
        .header { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 30px 25px 0 25px; z-index: 2; }
        .logo-icon { background: var(--theme-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px; }
        .header-text { color: var(--theme-main); text-align: right; font-size: 14px; font-weight: 500; line-height: 1.3; letter-spacing: 0.5px; text-transform: uppercase; }

        .profile-section { margin-top: 2vh; display: flex; flex-direction: column; align-items: center; z-index: 2; width: 100%; padding: 0 20px; }

        .img-ring { width: 140px; height: 140px; border-radius: 50%; background: var(--theme-gradient); padding: 3px; margin-bottom: 12px; box-shadow: 0 10px 25px var(--shadow-img); }
        .img-inner-ring { width: 100%; height: 100%; border-radius: 50%; background-color: var(--bg-card); padding: 4px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--theme-main); background-color: #222222; }

        .name { background: var(--theme-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
        .title { color: var(--theme-light); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; font-weight: 500; }
        .subtitle { color: #a0a0a5; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 400; }

        /* ÁREA CENTRAL */
        .middle-content { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex-grow: 1; width: 100%; padding: 15px 25px 0 25px; z-index: 2; }
        .bio-text { color: #e0e0e0; font-size: 13px; text-align: center; line-height: 1.5; margin-bottom: 15px; font-weight: 300; }

        /* CONTAINER DOS ÍCONES */
        .icons-container { display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%; margin-bottom: 30px; }

        .icon-btn { 
            width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--theme-main); 
            display: flex; justify-content: center; align-items: center; 
            color: var(--theme-main); text-decoration: none; font-size: 20px; 
            background: var(--bg-icon); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            
            /* A mágica do sistema matemático acontece aqui (o '* -1' inverte para que positivo suba e negativo desça) */
            transform: translateY(calc(var(--posicao) * var(--forca) * -1));
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease; 
        }

        @media (hover: hover) {
            .icon-btn:hover { 
                background: var(--theme-gradient); color: var(--bg-card); border-color: transparent; box-shadow: 0 5px 15px var(--shadow-theme-strong); 
                /* Mantém a posição original e apenas sobrepõe um efeito de subir e dar zoom */
                transform: translateY(calc((var(--posicao) * var(--forca) * -1) - 8px)) scale(1.1) !important;
            }
        }

        .icon-btn:active { 
            /* Encolhe o ícone mantendo a posição original calculada */
            transform: translateY(calc(var(--posicao) * var(--forca) * -1)) scale(0.9) !important; 
            background: var(--theme-main); color: var(--bg-card); transition: transform 0.1s; 
        }

        .action-btn { background: var(--theme-gradient); color: var(--bg-card); padding: 14px 35px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px var(--shadow-theme-medium); transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .action-btn:active { transform: scale(0.94); box-shadow: 0 4px 10px var(--shadow-theme-light); }

        .footer-text { color: var(--theme-dark); font-size: 11px; margin-top: auto; margin-bottom: 25px; z-index: 2; letter-spacing: 1px; text-transform: uppercase; opacity: 0.8; text-shadow: 0 2px 4px var(--shadow-text); }

        @media (max-height: 667px) {
            .profile-section { margin-top: 2vh; }
            .img-ring { width: 110px; height: 110px; margin-bottom: 10px; }
            .bio-text { margin-bottom: 10px; font-size: 12px; }
            .icons-container { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <i class="fas fa-code splash-icon"></i>
        <h2 class="splash-title">Iniciando...</h2>
        <div class="loading-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <div class="card card-enter">
        <div class="bottom-image-bg"></div>

        <div class="header">
            <i class="fas fa-code logo-icon"></i>
            <div class="header-text">Software &<br>Tecnologia</div>
        </div>

        <div class="profile-section">
            <div class="img-ring">
                <div class="img-inner-ring">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRaRn0uqROzdoc39UAGhmUJdIrylWTH9iXWemyJcb0grg&s=10" alt="Pablo Henrique" class="profile-img">
                </div>
            </div>
            <h1 class="name">Pablo Henrique</h1>
            <p class="title">Desenvolvedor Web e Software</p>
            <p class="subtitle">Criador do Louisiana PDV</p>
        </div>

        <div class="middle-content">
            <p class="bio-text">
                Especialista em construir sistemas ágeis e interfaces modernas focadas na usabilidade mobile.
            </p>

            <div class="icons-container">
                <a href="mailto:seuemail@email.com" class="icon-btn" aria-label="E-mail"><i class="fas fa-envelope"></i></a>
                <a href="https://github.com/HenriqueDev25/" class="icon-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/" class="icon-btn" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://web.whatsapp.com/send/?phone=5511981127561" class="icon-btn" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="tel:+5511981127561" class="icon-btn" aria-label="Telefone"><i class="fas fa-phone-alt"></i></a>
            </div>

            <a href="#" class="action-btn">
                <i class="fas fa-user-plus"></i> Salvar Contato
            </a>
        </div>

        <p class="footer-text">Desenvolvido por Pablo</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splashScreen = document.getElementById("splashScreen");
            setTimeout(() => {
                splashScreen.classList.add("splash-hidden");
                setTimeout(() => {
                    splashScreen.style.display = "none";
                }, 600);
            }, 2000); 
        });
    </script>
</body>
</html>
